version: "3.9"

services:

  # ── Kafka + ZooKeeper ──────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: agro_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: agro_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Kafka UI (visualização do tópico no browser) ───────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: agro_kafka_ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9000:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: agro-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ── Producer: publica leituras de sensores no Kafka ────────────────────────
  producer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agro_producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC: sensor_leituras
      MODO: producer
    command: ["python", "producer.py"]
    restart: unless-stopped

  # ── Dashboard Flask: consome Kafka e serve o dashboard ─────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agro_app
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC: sensor_leituras
      MODO: consumer
    volumes:
      - agro_dados:/app/dados
    restart: unless-stopped

volumes:
  agro_dados:
